openapi: 3.0.3
info:
  title: Pinscore Events API
  version: 1.0.0
  description: Deterministic creator scoring engine — event ingestion endpoint

paths:
  /api/events/ingest:
    post:
      summary: Ingest batch of canonical events
      description: >
        Accepts up to 100 canonical events.
        Entire batch is rejected atomically if any event is invalid or a duplicate event_id is detected.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - events
              additionalProperties: false
              properties:
                events:
                  type: array
                  maxItems: 100
                  items:
                    $ref: '#/components/schemas/Event'
      responses:
        '201':
          description: Batch successfully ingested
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '400':
          description: Invalid schema, enum violation, or batch size exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Duplicate event_id detected
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/events:
    get:
      summary: Get events for authenticated creator
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: page
          schema: { type: integer, default: 1 }
        - in: query
          name: limit
          schema: { type: integer, default: 20, maximum: 100 }
      responses:
        '200':
          description: Paginated event list
        '401':
          description: Unauthorized

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    Event:
      type: object
      additionalProperties: false
      required:
        - event_id
        - platform
        - creator_id
        - event_type
        - value
        - timestamp
      properties:
        event_id:
          type: string
          format: uuid
        platform:
          type: string
          enum: [instagram, twitter, youtube, tiktok]
        creator_id:
          type: string
          description: Sourced from JWT — body value is overwritten
        fan_id:
          type: string
          nullable: true
        event_type:
          type: string
          enum: [like, comment, share, save, follow, click, mention, view, profile_visit]
        value:
          type: number
        metadata:
          type: object
          additionalProperties: true
        timestamp:
          type: string
          format: date-time

    SuccessResponse:
      type: object
      required: [success, ingested_count, failed_count]
      properties:
        success:
          type: boolean
          example: true
        ingested_count:
          type: integer
          example: 24
        failed_count:
          type: integer
          example: 0
        version:
          type: string
          example: v1

    ErrorResponse:
      type: object
      required: [success, error, code]
      properties:
        success:
          type: boolean
          example: false
        error:
          type: string
        code:
          type: string
          enum:
            - INVALID_SCHEMA
            - INVALID_ENUM
            - DUPLICATE_EVENT
            - UNAUTHORIZED
            - BATCH_LIMIT_EXCEEDED
            - RATE_LIMIT_EXCEEDED
        errors:
          type: array
          items:
            type: object
            properties:
              event_id: { type: string }
              reason:   { type: string }
